<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Inter</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'self'; connect-src 'self';">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d; color: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 380px;
    }
    h1 {
      font-size: 20px; font-weight: 600; margin-bottom: 28px; text-align: center;
    }
    .provider-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.05);
      color: #f0f0f0; font-size: 14px; font-weight: 500;
      cursor: pointer; text-decoration: none; margin-bottom: 12px;
      transition: background 0.15s;
    }
    .provider-btn:hover { background: rgba(255,255,255,0.10); }
    .provider-btn svg { flex-shrink: 0; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: rgba(255,255,255,0.35); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.12);
    }
    label {
      display: block; font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.6); margin-bottom: 6px; margin-top: 16px;
    }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08); color: #f0f0f0;
      font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(255,255,255,0.35); }
    input::placeholder { color: rgba(255,255,255,0.3); }
    .submit-btn {
      width: 100%; padding: 12px; margin-top: 24px; border: none;
      border-radius: 10px; background: #2563eb; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: #ef4444; font-size: 12px; margin-top: 12px;
      text-align: center; display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in to Inter</h1>

    <!-- Google Sign-In button (follows Google branding guidelines) -->
    <a class="provider-btn" href="/auth/oauth/google/start" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <!-- Microsoft Sign-In button -->
    <a class="provider-btn" href="/auth/oauth/microsoft/start" id="msBtn">
      <svg width="18" height="18" viewBox="0 0 21 21">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Continue with Microsoft
    </a>

    <div class="divider">or</div>

    <!-- Email/Password form — posts to the same /auth/login endpoint -->
    <form id="loginForm" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com"
             autocomplete="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Minimum 8 characters"
             autocomplete="current-password" required minlength="8" maxlength="72">

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
